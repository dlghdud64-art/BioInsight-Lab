<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabAxis - 바이오 연구 구매 운영 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body, html { margin:0; padding:0; width:100%; height:100%; background:#18191c; font-family:'Inter',sans-serif; color:#fff; overflow-x:hidden; }
        #spline-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.7; }
        .radial-mask { position:absolute; inset:0; background:radial-gradient(circle at center, transparent 10%, #18191c 70%); z-index:1; pointer-events:none; }
        .tracking-tighter { letter-spacing:-0.04em; }
    </style>
</head>
<body>
    <!-- 3D Background (center, behind everything) -->
    <div id="spline-canvas"></div>
    <div class="radial-mask"></div>

    <div class="relative z-10 min-h-screen flex flex-col">

        <!-- Nav -->
        <nav class="flex justify-between items-center px-6 lg:px-12 py-5 max-w-[1400px] mx-auto w-full border-b border-white/5">
            <div class="flex items-center gap-2 cursor-pointer">
                <span class="font-bold text-xl tracking-tight text-white">LabAxis</span>
            </div>
            <div class="flex items-center gap-6">
                <button class="text-sm font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    검색
                </button>
                <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-md transition-all">대시보드</button>
                <div class="flex items-center gap-2 cursor-pointer">
                    <div class="w-7 h-7 rounded-full bg-zinc-700 flex items-center justify-center text-xs font-bold">Y</div>
                    <span class="text-sm font-medium text-zinc-300 hidden md:inline">young a</span>
                </div>
            </div>
        </nav>

        <!-- Hero -->
        <section class="flex-1 flex flex-col items-center justify-center text-center max-w-5xl mx-auto px-6 pt-20 pb-16">

            <p class="text-blue-500 font-bold text-xs tracking-[0.2em] mb-6 uppercase">Biotech Procurement Operations Platform</p>

            <h1 class="text-4xl md:text-5xl lg:text-[54px] font-extrabold tracking-tight leading-[1.3] text-white mb-6" style="text-shadow:0 2px 20px rgba(0,0,0,0.5)">
                구매 요청부터 입고·재고까지,<br/>
                연구 구매 운영을<br/>
                <span class="text-blue-500">한곳에서</span> 연결합니다
            </h1>

            <p class="text-base md:text-lg text-zinc-400 mb-10 font-medium leading-relaxed max-w-2xl">
                시약·장비 검색, 비교, 견적, 발주, 입고, 재고 관리까지<br/>
                흩어진 연구 구매 업무를 하나의 운영 흐름으로 연결하세요.
            </p>

            <div class="flex flex-col sm:flex-row gap-3">
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3.5 rounded-lg font-semibold text-[15px] flex items-center justify-center gap-2 transition-all">
                    시약·장비 검색 시작하기
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
                <button class="bg-[#2a2b30] hover:bg-[#35363c] text-zinc-200 border border-zinc-700/50 px-8 py-3.5 rounded-lg font-semibold text-[15px] transition-all">
                    도입 문의하기
                </button>
            </div>

            <!-- Pipeline -->
            <div class="mt-24 w-full">
                <p class="text-zinc-600 font-semibold text-[10px] tracking-widest uppercase mb-6">End-to-End Operations Pipeline</p>
                <div class="flex flex-wrap justify-center items-center gap-2 md:gap-4 lg:gap-6">

                    <!-- Step 1: 검색 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">검색</span>
                        <span class="text-[10px] text-zinc-500 mt-1">시약·장비 단일 검색</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

                    <!-- Step 2: 비교 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">비교</span>
                        <span class="text-[10px] text-zinc-500 mt-1">벤더별 스펙 가격 비교</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

                    <!-- Step 3: 견적 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">견적</span>
                        <span class="text-[10px] text-zinc-500 mt-1">견적 요청 및 자동 문서</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

                    <!-- Step 4: 발주 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">발주</span>
                        <span class="text-[10px] text-zinc-500 mt-1">승인 라인 및 연동</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

                    <!-- Step 5: 입고 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">입고</span>
                        <span class="text-[10px] text-zinc-500 mt-1">QR 입고 및 검수</span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

                    <!-- Step 6: 재고 -->
                    <div class="flex flex-col items-center">
                        <div class="w-12 h-12 rounded-xl bg-[#202228] border border-zinc-800 flex items-center justify-center mb-3 text-blue-500 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>
                        </div>
                        <span class="text-sm font-bold text-zinc-200">재고</span>
                        <span class="text-[10px] text-zinc-500 mt-1">실시간 재고·유효기간</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Three.js donut-like 3D background -->
    <script>
        const container = document.getElementById('spline-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        // Torus (donut) geometry
        const torusGeo = new THREE.TorusGeometry(2.5, 1, 64, 128);
        const torusMat = new THREE.MeshStandardMaterial({
            color: 0x3b82f6,
            roughness: 0.3,
            metalness: 0.8,
            transparent: true,
            opacity: 0.6,
            wireframe: false,
        });
        const torus = new THREE.Mesh(torusGeo, torusMat);
        torus.rotation.x = Math.PI * 0.4;
        torus.rotation.y = Math.PI * 0.2;
        scene.add(torus);

        // Wireframe overlay
        const wireGeo = new THREE.TorusGeometry(2.55, 1.02, 32, 64);
        const wireMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, wireframe: true, transparent: true, opacity: 0.15 });
        const wire = new THREE.Mesh(wireGeo, wireMat);
        wire.rotation.copy(torus.rotation);
        scene.add(wire);

        // Particles around torus
        const pCount = 500;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const angle2 = Math.random() * Math.PI * 2;
            const r = 2.5 + Math.cos(angle2) * 1 + (Math.random() - 0.5) * 1.5;
            pPos[i*3] = Math.cos(angle) * r + (Math.random()-0.5)*0.5;
            pPos[i*3+1] = Math.sin(angle2) * 1 + (Math.random()-0.5)*1.5;
            pPos[i*3+2] = Math.sin(angle) * r + (Math.random()-0.5)*0.5;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ color: 0x60a5fa, size: 0.03, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(pGeo, pMat);
        particles.rotation.copy(torus.rotation);
        scene.add(particles);

        // Lights
        const light1 = new THREE.DirectionalLight(0x3b82f6, 2);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0x8b5cf6, 1);
        light2.position.set(-5, -3, 3);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x333333, 1));

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.y += 0.003;
            torus.rotation.x += 0.001;
            wire.rotation.y += 0.003;
            wire.rotation.x += 0.001;
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.0008;

            camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 0.8 + 2 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
