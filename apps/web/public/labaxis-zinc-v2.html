<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabAxis - The Autonomous OS for Modern Bio-Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body, html { margin:0; padding:0; width:100%; height:100%; background:#fafafa; font-family:'Inter',sans-serif; color:#18181b; overflow-x:hidden; }
        #spline-canvas { position:absolute; top:0; right:0; width:60%; height:100%; z-index:0; opacity:0.9; }
        @media(max-width:768px){ #spline-canvas { width:100%; opacity:0.25; } }
        .gradient-mask { position:absolute; top:0; left:0; z-index:1; pointer-events:none; }
        @media(min-width:769px){ .gradient-mask { width:55%; height:100%; background:linear-gradient(to right,#fafafa 50%,transparent 100%); } }
        @media(max-width:768px){ .gradient-mask { width:100%; height:100%; background:linear-gradient(to bottom,#fafafa 35%,transparent 100%); } }
        .tracking-tighter { letter-spacing:-0.04em; }
    </style>
</head>
<body>
    <div id="spline-canvas"></div>
    <div class="gradient-mask"></div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- Nav -->
        <nav class="flex justify-between items-center px-6 lg:px-12 py-6 max-w-[1400px] mx-auto w-full">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center shadow-md shadow-zinc-900/20">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <span class="font-bold text-xl tracking-tight text-zinc-900">LabAxis</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-zinc-500">
                <a href="#" class="hover:text-zinc-900 transition-colors">Platform</a>
                <a href="#" class="hover:text-zinc-900 transition-colors">Solutions</a>
                <a href="#" class="hover:text-zinc-900 transition-colors">Compliance</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 mr-4">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">System Online</span>
                </div>
                <button class="hidden md:block text-sm font-medium text-zinc-500 hover:text-zinc-900 transition-colors">Sign in</button>
                <button class="bg-zinc-900 hover:bg-zinc-800 text-white text-sm font-medium px-5 py-2.5 rounded-full transition-all shadow-lg shadow-zinc-900/20 hover:shadow-zinc-900/30 transform hover:-translate-y-0.5">Initialize OS</button>
            </div>
        </nav>

        <!-- Hero -->
        <section class="flex-1 flex items-center max-w-[1400px] mx-auto px-6 lg:px-12 pt-24 pb-32">
            <div class="max-w-2xl">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-200/50 border border-zinc-300 mb-8 cursor-pointer hover:bg-zinc-200 transition-colors" style="backdrop-filter:blur(8px)">
                    <span class="w-2 h-2 rounded-full bg-zinc-800"></span>
                    <span class="text-xs font-semibold tracking-wide text-zinc-800 uppercase">Ontology Engine v2.0</span>
                </div>

                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-[1.1] text-zinc-900 mb-6">
                    The Autonomous OS <br/>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-zinc-900 to-zinc-500">for Modern Bio-Labs.</span>
                </h1>

                <p class="text-lg md:text-xl text-zinc-500 mb-10 font-medium leading-relaxed max-w-xl">
                    파편화된 시약, 예산, 규제 데이터를 단일 온톨로지로 통합합니다.
                    인간의 엄격한 통제망 안에서 AI가 연구실을 안전하게 최적화합니다.
                </p>

                <div class="flex flex-col sm:flex-row gap-4">
                    <button class="bg-zinc-900 hover:bg-zinc-800 text-white px-8 py-4 rounded-xl font-semibold text-[15px] flex items-center justify-center gap-2 transition-all shadow-lg shadow-zinc-900/20 hover:shadow-zinc-900/30 transform hover:-translate-y-1">
                        Start Building
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    <button class="bg-white hover:bg-zinc-100 text-zinc-700 border border-zinc-200 px-8 py-4 rounded-xl font-semibold text-[15px] flex items-center justify-center gap-2 transition-all shadow-sm">
                        Explore Architecture
                    </button>
                </div>

                <div class="mt-16 pt-8 border-t border-zinc-200/80 flex gap-8 items-center">
                    <div>
                        <p class="text-2xl font-bold text-zinc-900">100<span class="text-zinc-500">%</span></p>
                        <p class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mt-1">Compliance Ready</p>
                    </div>
                    <div class="w-px h-10 bg-zinc-200"></div>
                    <div>
                        <p class="text-2xl font-bold text-zinc-900">Zero</p>
                        <p class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mt-1">Direct DB Access</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const container = document.getElementById('spline-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 1, 2000);
        camera.position.set(0, 100, 350);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);

        // Organic blob-like geometry for more Spline-like feel
        const SEP = 30, AX = 80, AY = 80, num = AX * AY;
        const pos = new Float32Array(num * 3), sc = new Float32Array(num);
        let ii = 0, jj = 0;
        for (let ix = 0; ix < AX; ix++) for (let iy = 0; iy < AY; iy++) {
            pos[ii] = ix * SEP - (AX * SEP) / 2; pos[ii+1] = 0; pos[ii+2] = iy * SEP - (AY * SEP) / 2;
            sc[jj] = 1; ii += 3; jj++;
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('scale', new THREE.BufferAttribute(sc, 1));
        const mat = new THREE.ShaderMaterial({
            uniforms: { color: { value: new THREE.Color(0x71717a) } },
            vertexShader: `attribute float scale; void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=scale*(35.0/-mv.z);gl_Position=projectionMatrix*mv;}`,
            fragmentShader: `uniform vec3 color;void main(){if(length(gl_PointCoord-vec2(0.5))>0.475)discard;gl_FragColor=vec4(color,0.2);}`,
            transparent: true, blending: THREE.NormalBlending, depthWrite: false
        });
        const pts = new THREE.Points(geo, mat); scene.add(pts);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', e => { mouseX = (e.clientX - window.innerWidth/2) * 0.05; mouseY = (e.clientY - window.innerHeight/2) * 0.05; });

        let count = 0;
        function animate() {
            requestAnimationFrame(animate);
            camera.position.x += (mouseX - camera.position.x) * 0.012;
            camera.position.y += (-mouseY + 100 - camera.position.y) * 0.012;
            camera.lookAt(scene.position);
            const p = pts.geometry.attributes.position.array, s = pts.geometry.attributes.scale.array;
            let i2 = 0, j2 = 0;
            for (let ix = 0; ix < AX; ix++) for (let iy = 0; iy < AY; iy++) {
                // More organic wave with multiple sine layers
                p[i2+1] = Math.sin((ix+count)*0.25)*20 + Math.sin((iy+count)*0.4)*20 + Math.sin((ix+iy+count*0.5)*0.15)*15;
                s[j2] = (Math.sin((ix+count)*0.25)+1)*1.2 + (Math.sin((iy+count)*0.4)+1)*1.2;
                i2 += 3; j2++;
            }
            pts.geometry.attributes.position.needsUpdate = true;
            pts.geometry.attributes.scale.needsUpdate = true;
            pts.rotation.y += 0.0003; count += 0.012;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = container.clientWidth/container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
        animate();
    </script>
</body>
</html>
