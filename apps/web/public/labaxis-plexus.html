<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabAxis - 바이오 연구 구매 운영 플랫폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body,html{margin:0;padding:0;width:100%;height:100%;background:#24252a;font-family:'Inter',sans-serif;color:#fff;overflow-x:hidden}
        #plexus-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.6}
        .radial-mask{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 10%,#24252a 100%);z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <canvas id="plexus-canvas"></canvas>
    <div class="radial-mask"></div>

    <div class="relative z-10 min-h-screen flex flex-col">
        <!-- Nav -->
        <nav class="flex justify-between items-center px-6 lg:px-12 py-5 max-w-[1400px] mx-auto w-full border-b border-white/5">
            <div class="flex items-center gap-2 cursor-pointer">
                <span class="font-bold text-xl tracking-tight text-white">LabAxis</span>
            </div>
            <div class="flex items-center gap-6">
                <button class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">요금 & 도입</button>
                <button class="text-sm font-medium text-zinc-400 hover:text-white transition-colors">로그인</button>
                <button class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold px-5 py-2.5 rounded-md transition-all">무료로 시작하기</button>
            </div>
        </nav>

        <!-- Hero -->
        <section class="flex-1 flex flex-col items-center justify-center text-center max-w-5xl mx-auto px-6 pt-20 pb-16">
            <p class="text-blue-500 font-bold text-[11px] tracking-[0.2em] mb-6 uppercase">Biotech Procurement Operations Platform</p>
            <h1 class="text-4xl md:text-5xl lg:text-[54px] font-extrabold tracking-tight leading-[1.3] text-white mb-6" style="filter:drop-shadow(0 2px 10px rgba(0,0,0,0.5))">
                구매 요청부터 입고·재고까지,<br/>연구 구매 운영을<br/><span class="text-blue-500">한곳에서</span> 연결합니다
            </h1>
            <p class="text-base md:text-lg text-zinc-400 mb-10 font-medium leading-relaxed max-w-2xl">
                시약·장비 검색, 비교, 견적, 발주, 입고, 재고 관리까지<br/>흩어진 연구 구매 업무를 하나의 운영 흐름으로 연결하세요.
            </p>
            <div class="flex flex-col sm:flex-row gap-3">
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3.5 rounded-lg font-semibold text-[15px] flex items-center justify-center gap-2 transition-all">
                    시약·장비 검색 시작하기
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
                <button class="bg-[#2a2b30] hover:bg-[#35363c] text-zinc-200 border border-zinc-700/50 px-8 py-3.5 rounded-lg font-semibold text-[15px] transition-all">도입 문의하기</button>
            </div>

            <!-- Pipeline -->
            <div class="mt-24 w-full max-w-4xl mx-auto border-t border-white/5 pt-12">
                <p class="text-zinc-600 font-semibold text-[10px] tracking-widest uppercase mb-8">End-to-End Operations Pipeline</p>
                <div class="flex flex-wrap justify-center items-center gap-2 md:gap-4 lg:gap-8">
                    <div class="flex flex-col items-center"><div class="w-12 h-12 rounded-xl bg-[#2a2b30] border border-zinc-700/50 flex items-center justify-center mb-3 text-blue-500 shadow-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div><span class="text-sm font-bold text-zinc-200">검색</span><span class="text-[10px] text-zinc-500 mt-1">시약·장비 단일 검색</span></div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <div class="flex flex-col items-center"><div class="w-12 h-12 rounded-xl bg-[#2a2b30] border border-zinc-700/50 flex items-center justify-center mb-3 text-blue-500 shadow-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div><span class="text-sm font-bold text-zinc-200">비교</span><span class="text-[10px] text-zinc-500 mt-1">벤더별 스펙 가격 비교</span></div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <div class="flex flex-col items-center"><div class="w-12 h-12 rounded-xl bg-[#2a2b30] border border-zinc-700/50 flex items-center justify-center mb-3 text-blue-500 shadow-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div><span class="text-sm font-bold text-zinc-200">견적</span><span class="text-[10px] text-zinc-500 mt-1">견적 요청 및 자동 문서</span></div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <div class="flex flex-col items-center"><div class="w-12 h-12 rounded-xl bg-[#2a2b30] border border-zinc-700/50 flex items-center justify-center mb-3 text-blue-500 shadow-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div><span class="text-sm font-bold text-zinc-200">발주</span><span class="text-[10px] text-zinc-500 mt-1">승인 라인 및 연동</span></div>
                    <svg class="w-4 h-4 text-zinc-700 mb-6 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <div class="flex flex-col items-center"><div class="w-12 h-12 rounded-xl bg-[#2a2b30] border border-zinc-700/50 flex items-center justify-center mb-3 text-blue-500 shadow-md"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg></div><span class="text-sm font-bold text-zinc-200">입고/재고</span><span class="text-[10px] text-zinc-500 mt-1">재고 연동 추적</span></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Plexus Network (sharp, no bubbles) -->
    <script>
        const canvas = document.getElementById('plexus-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -9999, y: -9999 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const count = Math.floor((canvas.width * canvas.height) / 18000);
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    radius: Math.random() * 1.2 + 0.5,
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Lines
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x, dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(148,163,184,${0.2 - (dist/150)*0.2})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
                // Mouse lines
                const dxm = p.x - mouse.x, dym = p.y - mouse.y;
                const distm = Math.sqrt(dxm*dxm + dym*dym);
                if (distm < 180) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.strokeStyle = `rgba(59,130,246,${0.3 - (distm/180)*0.3})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // Nodes
            for (const p of particles) {
                const dxm = p.x - mouse.x, dym = p.y - mouse.y;
                const distm = Math.sqrt(dxm*dxm + dym*dym);
                if (distm < 100 && mouse.x !== -9999) {
                    p.x += dxm * 0.01;
                    p.y += dym * 0.01;
                } else {
                    p.x += p.vx;
                    p.y += p.vy;
                }
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(203,213,225,0.8)';
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        init(); draw();
        window.addEventListener('resize', init);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    </script>
</body>
</html>
