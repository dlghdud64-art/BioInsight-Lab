<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioInsight - The Lab OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 50px 50px;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 1;
            pointer-events: none;
        }
        #spline-placeholder-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .tracking-tighter { letter-spacing: -0.04em; }
        .gradient-text {
            background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-primary {
            background-color: #ffffff;
            color: #000000;
            transition: all 0.2s ease;
            box-shadow: 0 0 0 0 rgba(255,255,255,0);
        }
        .btn-primary:hover {
            background-color: #f4f4f5;
            box-shadow: 0 0 20px 0 rgba(255,255,255,0.2);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background-color: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }
        .hero-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, rgba(0,0,0,0) 60%);
            filter: blur(60px);
            z-index: -1;
            pointer-events: none;
        }
        .premium-badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div id="spline-placeholder-canvas"></div>
    <main class="content-wrapper">
        <nav class="w-full flex justify-between items-center px-8 py-6 max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="w-6 h-6 rounded-sm bg-white flex items-center justify-center">
                    <div class="w-2 h-2 rounded-full bg-black"></div>
                </div>
                <span class="font-semibold text-lg tracking-tight">BioInsight</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-[#888888]">
                <a href="#" class="hover:text-white transition-colors">Platform</a>
                <a href="#" class="hover:text-white transition-colors">Ontology</a>
                <a href="#" class="hover:text-white transition-colors">Compliance</a>
                <a href="#" class="hover:text-white transition-colors">Documentation</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-sm font-medium text-[#888888] hover:text-white transition-colors">Sign in</button>
                <button class="btn-primary text-sm font-medium px-4 py-2 rounded-md">Deploy OS</button>
            </div>
        </nav>
        <section class="flex-1 flex flex-col items-center justify-center px-4 text-center relative">
            <div class="hero-glow"></div>
            <div class="premium-badge px-3 py-1.5 rounded-full flex items-center gap-2 mb-8 cursor-pointer hover:bg-white/10 transition-colors">
                <span class="w-2 h-2 rounded-full bg-sky-400"></span>
                <span class="text-xs font-medium text-gray-300">Introducing Ontology Adapter v2.0</span>
                <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </div>
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter leading-[1.1] mb-6 max-w-5xl">
                The Autonomous OS <br/>
                <span class="gradient-text">for Modern Bio-Labs.</span>
            </h1>
            <p class="text-lg md:text-xl text-[#888888] max-w-2xl mb-12 font-light leading-relaxed">
                파편화된 시약, 예산, 규제 데이터를 단일 온톨로지로 통합합니다.
                <br class="hidden md:block"/>인간의 엄격한 통제망 안에서 AI가 연구실을 안전하게 최적화합니다.
            </p>
            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                <button class="btn-primary px-8 py-4 rounded-lg font-semibold text-[15px] flex items-center justify-center gap-2">
                    Start Building
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
                <button class="btn-secondary px-8 py-4 rounded-lg font-semibold text-[15px] flex items-center justify-center gap-2">
                    Explore Architecture
                </button>
            </div>
        </section>
        <footer class="w-full max-w-7xl mx-auto px-8 py-12 flex flex-col items-center justify-center border-t border-white/5 mt-auto">
            <p class="text-xs font-medium text-[#666666] uppercase tracking-widest mb-6">Powered by Enterprise-Grade Infrastructure</p>
            <div class="flex gap-8 md:gap-16 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
                <span class="text-lg font-bold tracking-tighter">Next.js</span>
                <span class="text-lg font-bold tracking-tighter">TypeScript</span>
                <span class="text-lg font-bold tracking-tighter">Prisma</span>
                <span class="text-lg font-bold tracking-tighter">OpenAI</span>
            </div>
        </footer>
    </main>
    <script>
        const container = document.getElementById('spline-placeholder-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0015);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 150, 400);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        const SEPARATION = 40, AMOUNTX = 70, AMOUNTY = 70;
        const numParticles = AMOUNTX * AMOUNTY;
        const positions = new Float32Array(numParticles * 3);
        const scales = new Float32Array(numParticles);
        let i = 0, j = 0;
        for (let ix = 0; ix < AMOUNTX; ix++) {
            for (let iy = 0; iy < AMOUNTY; iy++) {
                positions[i] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2);
                positions[i + 1] = 0;
                positions[i + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2);
                scales[j] = 1;
                i += 3;
                j++;
            }
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));
        const material = new THREE.ShaderMaterial({
            uniforms: {
                color: { value: new THREE.Color(0x38bdf8) }
            },
            vertexShader: `
                attribute float scale;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = scale * (50.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                void main() {
                    if (length(gl_PointCoord - vec2(0.5, 0.5)) > 0.475) discard;
                    gl_FragColor = vec4(color, 0.4);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        let mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;
        document.addEventListener('mousemove', onDocumentMouseMove, false);
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        function onDocumentMouseMove(event) {
            mouseX = (event.clientX - windowHalfX) * 0.1;
            mouseY = (event.clientY - windowHalfY) * 0.1;
        }
        let count = 0;
        function animate() {
            requestAnimationFrame(animate);
            camera.position.x += (mouseX - camera.position.x) * 0.02;
            camera.position.y += (-mouseY - camera.position.y) * 0.02 + 0.1;
            camera.lookAt(scene.position);
            const pos = particles.geometry.attributes.position.array;
            const sc = particles.geometry.attributes.scale.array;
            let ii = 0, jj = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    pos[ii + 1] = (Math.sin((ix + count) * 0.3) * 30) + (Math.sin((iy + count) * 0.5) * 30);
                    sc[jj] = (Math.sin((ix + count) * 0.3) + 1) * 2 + (Math.sin((iy + count) * 0.5) + 1) * 2;
                    ii += 3;
                    jj++;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            particles.geometry.attributes.scale.needsUpdate = true;
            particles.rotation.y += 0.0005;
            count += 0.02;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
