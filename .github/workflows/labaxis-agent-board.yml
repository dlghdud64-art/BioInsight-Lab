name: LabAxis Agent Board

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      pilot:
        description: "Pilot scenario id to review"
        required: false
        default: "03-expired-lot-disposal"
      base_ref:
        description: "Manual diff base ref. Use HEAD~1 to review the latest pushed commit."
        required: false
        default: "HEAD~1"
      changed_files:
        description: "Optional explicit changed files, one per line"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Review Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout LabAxis
        uses: actions/checkout@v4
        with:
          path: labaxis
          fetch-depth: 0

      - name: Verify Agent Board repository token
        env:
          AGENT_BOARD_TOKEN: ${{ secrets.AGENT_BOARD_TOKEN }}
        run: |
          if [ -z "$AGENT_BOARD_TOKEN" ]; then
            echo "::error title=AGENT_BOARD_TOKEN missing::Add repository secret AGENT_BOARD_TOKEN with read access to the private labaxis-agent-board repo, or make that repo public."
            exit 1
          fi

      - name: Checkout LabAxis Agent Board
        uses: actions/checkout@v4
        with:
          repository: dlghdud64-art/labaxis-agent-board
          path: labaxis-agent-board
          fetch-depth: 1
          token: ${{ secrets.AGENT_BOARD_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate agent-board
        working-directory: labaxis-agent-board
        run: npm run check

      - name: Validate agent-board contracts
        working-directory: labaxis-agent-board
        run: npm run test:contracts

      - name: Verify OpenAI API secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error title=OPENAI_API_KEY missing::Add repository secret OPENAI_API_KEY before enabling the full LabAxis Agent Board gate."
            exit 1
          fi

      - name: Run LabAxis review gate
        working-directory: labaxis-agent-board
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LABAXIS_REVIEW_PILOT: ${{ vars.LABAXIS_REVIEW_PILOT }}
          LABAXIS_REVIEW_INPUT_PILOT: ${{ github.event.inputs.pilot }}
          LABAXIS_REVIEW_INPUT_BASE: ${{ github.event.inputs.base_ref }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILES: ${{ github.event.inputs.changed_files }}
          OPENAI_AGENT_MODEL: ${{ vars.OPENAI_AGENT_MODEL }}
          OPENAI_ARBITER_MODEL: ${{ vars.OPENAI_ARBITER_MODEL }}
        run: |
          PILOT="${LABAXIS_REVIEW_INPUT_PILOT:-${LABAXIS_REVIEW_PILOT:-03-expired-lot-disposal}}"
          export OPENAI_AGENT_MODEL="${OPENAI_AGENT_MODEL:-gpt-5.4-mini}"
          export OPENAI_ARBITER_MODEL="${OPENAI_ARBITER_MODEL:-gpt-5.4-mini}"
          SUMMARY="Manual LabAxis Agent Board run"
          BASE_ARGS=()
          CHANGED_ARGS=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUMMARY="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            BASE_ARGS=(--base "origin/${{ github.base_ref }}")
          else
            MANUAL_BASE="${LABAXIS_REVIEW_INPUT_BASE:-HEAD~1}"
            SUMMARY="Manual LabAxis Agent Board run (base: ${MANUAL_BASE})"
            BASE_ARGS=(--base "$MANUAL_BASE")
            while IFS= read -r file; do
              file="$(echo "$file" | xargs)"
              if [ -n "$file" ]; then
                CHANGED_ARGS+=(--changed "$file")
              fi
            done <<< "$LABAXIS_REVIEW_INPUT_CHANGED_FILES"
          fi
          node src/run.mjs ci \
            --project "$GITHUB_WORKSPACE/labaxis" \
            --pilot "$PILOT" \
            --summary "$SUMMARY" \
            "${BASE_ARGS[@]}" \
            "${CHANGED_ARGS[@]}" \
            --out "$RUNNER_TEMP/labaxis-review-gate"

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" ]; then
            cat "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "LabAxis CI summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload review bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labaxis-review-gate
          path: ${{ runner.temp }}/labaxis-review-gate
          if-no-files-found: ignore
