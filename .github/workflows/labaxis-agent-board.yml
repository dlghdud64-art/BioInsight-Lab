name: LabAxis Agent Board

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      pilot:
        description: Pilot scenario name or auto
        required: false
        default: auto
        type: string
      base_ref:
        description: Base ref for manual diff review (for example HEAD~1 or a commit SHA)
        required: false
        default: HEAD~1
        type: string
      changed_files:
        description: Legacy newline-separated changed file paths
        required: false
        type: string
      changed_file_1:
        description: Changed file path 1
        required: false
        type: string
      changed_file_2:
        description: Changed file path 2
        required: false
        type: string
      changed_file_3:
        description: Changed file path 3
        required: false
        type: string
      browser_url:
        description: Runtime URL to inspect; leave blank for configured production URL
        required: false
        type: string
      browser_route_1:
        description: Primary browser route or auto
        required: false
        default: auto
        type: string
      browser_route_2:
        description: Additional browser route
        required: false
        type: string
      browser_route_3:
        description: Additional browser route
        required: false
        type: string
      browser_routes:
        description: Additional comma or newline-separated browser routes
        required: false
        type: string
      browser_click_mode:
        description: Browser click mode
        required: false
        default: safe
        type: string
      browser_max_clicks:
        description: Browser click sampling budget
        required: false
        default: "6"
        type: string
      browser_assertion_profile:
        description: Browser assertion profile or auto
        required: false
        default: auto
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Review Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout LabAxis
        uses: actions/checkout@v4
        with:
          path: labaxis
          fetch-depth: 0

      - name: Verify Agent Board repository token
        env:
          AGENT_BOARD_TOKEN: ${{ secrets.AGENT_BOARD_TOKEN }}
        run: |
          if [ -z "$AGENT_BOARD_TOKEN" ]; then
            echo "::error title=AGENT_BOARD_TOKEN missing::Add repository secret AGENT_BOARD_TOKEN with read access to the private labaxis-agent-board repo, or make that repo public."
            exit 1
          fi

      - name: Checkout LabAxis Agent Board
        uses: actions/checkout@v4
        with:
          repository: dlghdud64-art/labaxis-agent-board
          path: labaxis-agent-board
          fetch-depth: 1
          token: ${{ secrets.AGENT_BOARD_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-board dependencies
        working-directory: labaxis-agent-board
        run: npm ci

      - name: Validate agent-board
        working-directory: labaxis-agent-board
        run: npm run check

      - name: Validate agent-board contracts
        working-directory: labaxis-agent-board
        run: npm run test:contracts

      - name: Install Browser Pilot runtime
        working-directory: labaxis-agent-board
        run: npx playwright install chromium

      - name: Verify OpenAI API secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error title=OPENAI_API_KEY missing::Add repository secret OPENAI_API_KEY before enabling the full LabAxis Agent Board gate."
            exit 1
          fi

      - name: Run LabAxis review gate
        working-directory: labaxis-agent-board
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          LABAXIS_REVIEW_PILOT: ${{ vars.LABAXIS_REVIEW_PILOT }}
          LABAXIS_REVIEW_INPUT_PILOT: ${{ github.event.inputs.pilot }}
          LABAXIS_REVIEW_INPUT_BASE: ${{ github.event.inputs.base_ref }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILES_LEGACY: ${{ github.event.inputs.changed_files }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_1: ${{ github.event.inputs.changed_file_1 }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_2: ${{ github.event.inputs.changed_file_2 }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_3: ${{ github.event.inputs.changed_file_3 }}
          OPENAI_AGENT_MODEL: ${{ vars.OPENAI_AGENT_MODEL }}
          OPENAI_ARBITER_MODEL: ${{ vars.OPENAI_ARBITER_MODEL }}
          LABAXIS_BROWSER_URL: ${{ github.event.inputs.browser_url || vars.LABAXIS_BROWSER_URL || 'https://www.labaxis.co.kr' }}
          LABAXIS_BROWSER_ROUTE_1: ${{ github.event.inputs.browser_route_1 || 'auto' }}
          LABAXIS_BROWSER_ROUTE_2: ${{ github.event.inputs.browser_route_2 || '' }}
          LABAXIS_BROWSER_ROUTE_3: ${{ github.event.inputs.browser_route_3 || '' }}
          LABAXIS_BROWSER_ROUTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_routes || vars.LABAXIS_BROWSER_ROUTES }}
          LABAXIS_BROWSER_CLICK_MODE: ${{ github.event.inputs.browser_click_mode || vars.LABAXIS_BROWSER_CLICK_MODE || 'safe' }}
          LABAXIS_BROWSER_MAX_CLICKS: ${{ github.event.inputs.browser_max_clicks || vars.LABAXIS_BROWSER_MAX_CLICKS || '6' }}
          LABAXIS_BROWSER_ASSERTION_PROFILE: ${{ github.event.inputs.browser_assertion_profile || vars.LABAXIS_BROWSER_ASSERTION_PROFILE || 'auto' }}
          LABAXIS_BROWSER_STATE_ENTRY_PROFILE: ${{ vars.LABAXIS_BROWSER_STATE_ENTRY_PROFILE }}
          LABAXIS_STORAGE_STATE_JSON: ${{ secrets.LABAXIS_STORAGE_STATE_JSON }}
        run: |
          PILOT="${LABAXIS_REVIEW_INPUT_PILOT:-${LABAXIS_REVIEW_PILOT:-auto}}"
          if [ -z "$PILOT" ]; then
            PILOT="auto"
          fi
          export OPENAI_AGENT_MODEL="${OPENAI_AGENT_MODEL:-gpt-5.4-mini}"
          export OPENAI_ARBITER_MODEL="${OPENAI_ARBITER_MODEL:-gpt-5.4-mini}"
          SUMMARY="Manual LabAxis Agent Board run"
          BASE_ARGS=()
          CHANGED_ARGS=()
          REVIEW_CHANGED_FILES=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUMMARY="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            BASE_ARGS=(--base "origin/${{ github.base_ref }}")
            REVIEW_CHANGED_FILES="$(git -C "$GITHUB_WORKSPACE/labaxis" diff --name-only "origin/${{ github.base_ref }}"...HEAD || true)"
          else
            MANUAL_BASE="${LABAXIS_REVIEW_INPUT_BASE:-HEAD~1}"
            SUMMARY="Manual LabAxis Agent Board run (base: ${MANUAL_BASE})"
            BASE_ARGS=(--base "$MANUAL_BASE")
            MANUAL_CHANGED_FILES="$(printf '%s\n%s\n%s\n%s\n' \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILES_LEGACY" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_1" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_2" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_3")"
            if [ -z "$(printf '%s' "$MANUAL_CHANGED_FILES" | tr -d '[:space:]')" ]; then
              MANUAL_CHANGED_FILES="$(git -C "$GITHUB_WORKSPACE/labaxis" diff --name-only "$MANUAL_BASE"...HEAD || git -C "$GITHUB_WORKSPACE/labaxis" diff --name-only "$MANUAL_BASE" HEAD || true)"
            fi
            REVIEW_CHANGED_FILES="$MANUAL_CHANGED_FILES"
            while IFS= read -r file; do
              file="$(echo "$file" | xargs)"
              if [ -n "$file" ]; then
                CHANGED_ARGS+=(--changed "$file")
              fi
            done <<< "$MANUAL_CHANGED_FILES"
          fi
          BROWSER_ARGS=()
          if [ -n "$LABAXIS_BROWSER_URL" ]; then
            BROWSER_ARGS+=(--url "$LABAXIS_BROWSER_URL")
            BROWSER_ARGS+=(--click-mode "${LABAXIS_BROWSER_CLICK_MODE:-safe}")
            BROWSER_ARGS+=(--max-clicks "${LABAXIS_BROWSER_MAX_CLICKS:-6}")
            BROWSER_ARGS+=(--assertion-profile "${LABAXIS_BROWSER_ASSERTION_PROFILE:-auto}")
            BROWSER_ARGS+=(--state-entry-profile "${LABAXIS_BROWSER_STATE_ENTRY_PROFILE:-auto}")
            ROUTES_SOURCE="$(printf '%s\n%s\n%s\n' \
              "$LABAXIS_BROWSER_ROUTE_1" \
              "$LABAXIS_BROWSER_ROUTE_2" \
              "$LABAXIS_BROWSER_ROUTE_3")"
            if [ -n "${LABAXIS_BROWSER_ROUTES:-}" ]; then
              ROUTES_SOURCE="$(printf '%s\n%s\n' "$ROUTES_SOURCE" "$LABAXIS_BROWSER_ROUTES")"
            fi
            ROUTES_COMPACT="$(printf '%s' "$ROUTES_SOURCE" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')"
            if [ -z "$ROUTES_COMPACT" ] || [ "$ROUTES_COMPACT" = "auto" ]; then
              ROUTE_HINT="$(printf '%s\n%s\n' "$PILOT" "$REVIEW_CHANGED_FILES" | tr '[:upper:]' '[:lower:]')"
              if printf '%s' "$ROUTE_HINT" | grep -Eq 'agent-board-dispatch|dispatch-control|\.github/workflows/labaxis-agent-board\.ya?ml'; then
                ROUTES_SOURCE="/"
              elif printf '%s' "$ROUTE_HINT" | grep -Eq 'quote|rfq|dashboard/quotes'; then
                ROUTES_SOURCE="/dashboard/quotes"
              elif printf '%s' "$ROUTE_HINT" | grep -Eq 'inventory|expired|lot|dashboard/inventory'; then
                ROUTES_SOURCE="/dashboard/inventory"
              elif printf '%s' "$ROUTE_HINT" | grep -Eq 'sourcing|search|compare|app/search|app/compare'; then
                ROUTES_SOURCE="/app/search?q=PBS"
              else
                ROUTES_SOURCE="/dashboard/inventory /dashboard/quotes /app/search?q=PBS"
              fi
            fi
            ROUTES_SOURCE="$(printf '%s' "$ROUTES_SOURCE" | tr ',;' '\n')"
            SEEN_ROUTES="|"
            while IFS= read -r route; do
              for route_token in $route; do
                route_token="$(echo "$route_token" | xargs)"
                if [ -n "$route_token" ]; then
                  if printf '%s' "$SEEN_ROUTES" | grep -Fq "|$route_token|"; then
                    continue
                  fi
                  SEEN_ROUTES="${SEEN_ROUTES}${route_token}|"
                  BROWSER_ARGS+=(--route "$route_token")
                fi
              done
            done <<< "$ROUTES_SOURCE"
            AUTH_STATE_SOURCE="none"
            if [ -n "$LABAXIS_STORAGE_STATE_JSON" ]; then
              STORAGE_STATE="$RUNNER_TEMP/labaxis-storage-state.json"
              printf '%s' "$LABAXIS_STORAGE_STATE_JSON" > "$STORAGE_STATE"
              BROWSER_ARGS+=(--storage-state "$STORAGE_STATE")
              AUTH_STATE_SOURCE="secret:LABAXIS_STORAGE_STATE_JSON"
            elif [ -n "${AUTH_SECRET:-${NEXTAUTH_SECRET:-}}" ]; then
              STORAGE_STATE="$RUNNER_TEMP/labaxis-storage-state.json"
              if node src/run.mjs auth-token-state \
                --project "$GITHUB_WORKSPACE/labaxis" \
                --url "$LABAXIS_BROWSER_URL" \
                --storage-state "$STORAGE_STATE"; then
                BROWSER_ARGS+=(--storage-state "$STORAGE_STATE")
                AUTH_STATE_SOURCE="minted:AUTH_SECRET/NEXTAUTH_SECRET"
              else
                AUTH_STATE_SOURCE="mint-failed:AUTH_SECRET/NEXTAUTH_SECRET"
                echo "::warning title=Auth state mint failed::Continuing without storage state so Agent Board can report the auth blocker."
              fi
            else
              AUTH_STATE_SOURCE="missing:LABAXIS_STORAGE_STATE_JSON/AUTH_SECRET/NEXTAUTH_SECRET"
            fi
            export LABAXIS_AUTH_STATE_SOURCE="$AUTH_STATE_SOURCE"
            echo "LabAxis auth state source: $LABAXIS_AUTH_STATE_SOURCE"
          fi
          node src/run.mjs ci \
            --project "$GITHUB_WORKSPACE/labaxis" \
            --pilot "$PILOT" \
            --summary "$SUMMARY" \
            "${BASE_ARGS[@]}" \
            "${CHANGED_ARGS[@]}" \
            "${BROWSER_ARGS[@]}" \
            --out "$RUNNER_TEMP/labaxis-review-gate"

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" ]; then
            cat "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "LabAxis CI summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload review bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labaxis-review-gate
          path: ${{ runner.temp }}/labaxis-review-gate
          if-no-files-found: ignore
