name: LabAxis Agent Board

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      pilot:
        description: "Pilot scenario id to review"
        required: false
        default: "03-expired-lot-disposal"
      base_ref:
        description: "Manual diff base ref. Use HEAD~1 to review the latest pushed commit."
        required: false
        default: "HEAD~1"
      changed_file_1:
        description: "Repo file path 1 only. Example: apps/web/src/... Do NOT enter /dashboard routes here."
        required: false
        default: ""
      changed_file_2:
        description: "Repo file path 2 only. Leave blank unless reviewing a specific file."
        required: false
        default: ""
      changed_file_3:
        description: "Repo file path 3 only. Browser routes belong in browser_routes below."
        required: false
        default: ""
      browser_url:
        description: "Staging/production URL for Browser Pilot safe-click checks."
        required: false
        default: "https://bio-insight-lab-web.vercel.app"
      browser_routes:
        description: "Screen routes for Browser Pilot, not files. Example: /dashboard/inventory,/dashboard/quotes,/app/search"
        required: false
        default: "/dashboard/inventory"
      browser_click_mode:
        description: "Browser Pilot click mode: none, safe, all"
        required: false
        default: "safe"
      browser_max_clicks:
        description: "Maximum Browser Pilot safe-click samples"
        required: false
        default: "6"
      browser_assertion_profile:
        description: "Browser Pilot assertions: auto, all, inventory-disposal, quote-dispatch, sourcing-ai-compare"
        required: false
        default: "auto"

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Review Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout LabAxis
        uses: actions/checkout@v4
        with:
          path: labaxis
          fetch-depth: 0

      - name: Verify Agent Board repository token
        env:
          AGENT_BOARD_TOKEN: ${{ secrets.AGENT_BOARD_TOKEN }}
        run: |
          if [ -z "$AGENT_BOARD_TOKEN" ]; then
            echo "::error title=AGENT_BOARD_TOKEN missing::Add repository secret AGENT_BOARD_TOKEN with read access to the private labaxis-agent-board repo, or make that repo public."
            exit 1
          fi

      - name: Checkout LabAxis Agent Board
        uses: actions/checkout@v4
        with:
          repository: dlghdud64-art/labaxis-agent-board
          path: labaxis-agent-board
          fetch-depth: 1
          token: ${{ secrets.AGENT_BOARD_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install agent-board dependencies
        working-directory: labaxis-agent-board
        run: npm ci

      - name: Validate agent-board
        working-directory: labaxis-agent-board
        run: npm run check

      - name: Validate agent-board contracts
        working-directory: labaxis-agent-board
        run: npm run test:contracts

      - name: Install Browser Pilot runtime
        if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.browser_url != '') || vars.LABAXIS_BROWSER_URL != '' }}
        working-directory: labaxis-agent-board
        run: npx playwright install chromium

      - name: Verify OpenAI API secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error title=OPENAI_API_KEY missing::Add repository secret OPENAI_API_KEY before enabling the full LabAxis Agent Board gate."
            exit 1
          fi

      - name: Run LabAxis review gate
        working-directory: labaxis-agent-board
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LABAXIS_REVIEW_PILOT: ${{ vars.LABAXIS_REVIEW_PILOT }}
          LABAXIS_REVIEW_INPUT_PILOT: ${{ github.event.inputs.pilot }}
          LABAXIS_REVIEW_INPUT_BASE: ${{ github.event.inputs.base_ref }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILES_LEGACY: ${{ github.event.inputs.changed_files }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_1: ${{ github.event.inputs.changed_file_1 }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_2: ${{ github.event.inputs.changed_file_2 }}
          LABAXIS_REVIEW_INPUT_CHANGED_FILE_3: ${{ github.event.inputs.changed_file_3 }}
          OPENAI_AGENT_MODEL: ${{ vars.OPENAI_AGENT_MODEL }}
          OPENAI_ARBITER_MODEL: ${{ vars.OPENAI_ARBITER_MODEL }}
          LABAXIS_BROWSER_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_url || vars.LABAXIS_BROWSER_URL }}
          LABAXIS_BROWSER_ROUTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_routes || vars.LABAXIS_BROWSER_ROUTES }}
          LABAXIS_BROWSER_CLICK_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_click_mode || vars.LABAXIS_BROWSER_CLICK_MODE }}
          LABAXIS_BROWSER_MAX_CLICKS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_max_clicks || vars.LABAXIS_BROWSER_MAX_CLICKS }}
          LABAXIS_BROWSER_ASSERTION_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser_assertion_profile || vars.LABAXIS_BROWSER_ASSERTION_PROFILE }}
          LABAXIS_BROWSER_STATE_ENTRY_PROFILE: ${{ vars.LABAXIS_BROWSER_STATE_ENTRY_PROFILE }}
          LABAXIS_STORAGE_STATE_JSON: ${{ secrets.LABAXIS_STORAGE_STATE_JSON }}
        run: |
          PILOT="${LABAXIS_REVIEW_INPUT_PILOT:-${LABAXIS_REVIEW_PILOT:-03-expired-lot-disposal}}"
          export OPENAI_AGENT_MODEL="${OPENAI_AGENT_MODEL:-gpt-5.4-mini}"
          export OPENAI_ARBITER_MODEL="${OPENAI_ARBITER_MODEL:-gpt-5.4-mini}"
          SUMMARY="Manual LabAxis Agent Board run"
          BASE_ARGS=()
          CHANGED_ARGS=()
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUMMARY="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            BASE_ARGS=(--base "origin/${{ github.base_ref }}")
          else
            MANUAL_BASE="${LABAXIS_REVIEW_INPUT_BASE:-HEAD~1}"
            SUMMARY="Manual LabAxis Agent Board run (base: ${MANUAL_BASE})"
            BASE_ARGS=(--base "$MANUAL_BASE")
            MANUAL_CHANGED_FILES="$(printf '%s\n%s\n%s\n%s\n' \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILES_LEGACY" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_1" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_2" \
              "$LABAXIS_REVIEW_INPUT_CHANGED_FILE_3")"
            while IFS= read -r file; do
              file="$(echo "$file" | xargs)"
              if [ -n "$file" ]; then
                CHANGED_ARGS+=(--changed "$file")
              fi
            done <<< "$MANUAL_CHANGED_FILES"
          fi
          BROWSER_ARGS=()
          if [ -n "$LABAXIS_BROWSER_URL" ]; then
            BROWSER_ARGS+=(--url "$LABAXIS_BROWSER_URL")
            BROWSER_ARGS+=(--click-mode "${LABAXIS_BROWSER_CLICK_MODE:-safe}")
            BROWSER_ARGS+=(--max-clicks "${LABAXIS_BROWSER_MAX_CLICKS:-6}")
            BROWSER_ARGS+=(--assertion-profile "${LABAXIS_BROWSER_ASSERTION_PROFILE:-auto}")
            BROWSER_ARGS+=(--state-entry-profile "${LABAXIS_BROWSER_STATE_ENTRY_PROFILE:-auto}")
            ROUTES_SOURCE="${LABAXIS_BROWSER_ROUTES:-/dashboard/inventory}"
            ROUTES_SOURCE="$(printf '%s' "$ROUTES_SOURCE" | tr ',;' '\n')"
            while IFS= read -r route; do
              for route_token in $route; do
                route_token="$(echo "$route_token" | xargs)"
                if [ -n "$route_token" ]; then
                  BROWSER_ARGS+=(--route "$route_token")
                fi
              done
            done <<< "$ROUTES_SOURCE"
            if [ -n "$LABAXIS_STORAGE_STATE_JSON" ]; then
              STORAGE_STATE="$RUNNER_TEMP/labaxis-storage-state.json"
              printf '%s' "$LABAXIS_STORAGE_STATE_JSON" > "$STORAGE_STATE"
              BROWSER_ARGS+=(--storage-state "$STORAGE_STATE")
            fi
          fi
          node src/run.mjs ci \
            --project "$GITHUB_WORKSPACE/labaxis" \
            --pilot "$PILOT" \
            --summary "$SUMMARY" \
            "${BASE_ARGS[@]}" \
            "${CHANGED_ARGS[@]}" \
            "${BROWSER_ARGS[@]}" \
            --out "$RUNNER_TEMP/labaxis-review-gate"

      - name: Publish gate summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" ]; then
            cat "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "LabAxis CI summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload review bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labaxis-review-gate
          path: ${{ runner.temp }}/labaxis-review-gate
          if-no-files-found: ignore
