name: LabAxis Agent Board Preflight

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  preflight:
    name: Preflight Only
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout LabAxis
        uses: actions/checkout@v4
        with:
          path: labaxis
          fetch-depth: 0

      - name: Verify Agent Board repository token
        env:
          AGENT_BOARD_TOKEN: ${{ secrets.AGENT_BOARD_TOKEN }}
        run: |
          if [ -z "$AGENT_BOARD_TOKEN" ]; then
            echo "::error title=AGENT_BOARD_TOKEN missing::Add repository secret AGENT_BOARD_TOKEN with read access to the private labaxis-agent-board repo, or make that repo public."
            exit 1
          fi

      - name: Checkout LabAxis Agent Board
        uses: actions/checkout@v4
        with:
          repository: dlghdud64-art/labaxis-agent-board
          path: labaxis-agent-board
          fetch-depth: 1
          token: ${{ secrets.AGENT_BOARD_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate agent-board
        working-directory: labaxis-agent-board
        run: npm run check

      - name: Validate agent-board contracts
        working-directory: labaxis-agent-board
        run: npm run test:contracts

      - name: Run LabAxis preflight gate
        working-directory: labaxis-agent-board
        env:
          LABAXIS_REVIEW_PILOT: ${{ vars.LABAXIS_REVIEW_PILOT }}
        run: |
          PILOT="${LABAXIS_REVIEW_PILOT:-03-expired-lot-disposal}"
          SUMMARY="Manual LabAxis Agent Board preflight run"
          BASE_ARGS=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUMMARY="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            BASE_ARGS="--base origin/${{ github.base_ref }}"
          fi
          node src/run.mjs ci \
            --project "$GITHUB_WORKSPACE/labaxis" \
            --pilot "$PILOT" \
            --summary "$SUMMARY" \
            $BASE_ARGS \
            --skip-api \
            --out "$RUNNER_TEMP/labaxis-review-gate"

      - name: Publish preflight summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" ]; then
            cat "$RUNNER_TEMP/labaxis-review-gate/ci-summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "LabAxis preflight summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload preflight bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: labaxis-review-preflight
          path: ${{ runner.temp }}/labaxis-review-gate
          if-no-files-found: ignore
