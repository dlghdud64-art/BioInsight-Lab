name: LabAxis Surface Guard

# Runs `scripts/check-no-inline-hex-bg.sh` on every PR + push to
# main / develop.
#
# The script enforces two LabAxis surface invariants under
# `apps/web/src/app/dashboard/**`:
#   Pattern A — no inline hex `style={{ backgroundColor: '#…' }}`
#               (must use bg-sh / bg-pn / bg-el LabAxis tokens or
#               Tailwind standard classes)
#   Pattern B — no page-internal `<Link href="/"><span>LabAxis</span>`
#               (DashboardShell owns the chrome; pages render content)
#
# Closes ADR-002 §11.49 — the script was originally manual-run only
# (§11.45). After §11.48 brought Pattern A violations to 0 and §11.47
# audited Pattern B as 0, both gates can run as a CI block.
#
# Local equivalent: .husky/pre-commit (scoped to staged dashboard
# files only).

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  surface-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run LabAxis Surface Guard
        run: |
          chmod +x scripts/check-no-inline-hex-bg.sh
          scripts/check-no-inline-hex-bg.sh

      - name: Run LabAxis UserInventory Usage Guard
        # §11.58 — UserInventory(legacy receipt log) 신규 사용 차단.
        # Phase 1+2+3 으로 application code 는 모두 ProductInventory 정렬 완료.
        # 모델 자체 drop 은 #userInventory-schema-drop 별도 트랙.
        run: |
          chmod +x scripts/check-no-userinventory-usage.sh
          scripts/check-no-userinventory-usage.sh

      - name: Run LabAxis Native Select Ban Guard
        # §11.75 — native <select> 신규 사용 차단. §11.71 → 0건 + §11.73
        # shadcn Select 본체 강화 후 LabAxis 표준. 신규 회귀 즉시 차단.
        run: |
          chmod +x scripts/check-no-native-select.sh
          scripts/check-no-native-select.sh

      - name: Run LabAxis API Surface Coverage Guard (advisory)
        # §11.60 — backend mutation endpoint 중 frontend caller 0건인
        # dead capability 자동 catch.
        # 첫 commit 은 advisory mode (exit 0 with violations report) — 점진적
        # cleanup batch 트랙들이 violations 를 0 에 가깝게 줄인 후
        # LABAXIS_API_COVERAGE_BLOCK=1 로 전환하여 enforce.
        run: |
          chmod +x scripts/check-api-surface-coverage.sh
          scripts/check-api-surface-coverage.sh

      - name: Run LabAxis Frontend Page Entry Coverage Guard (advisory)
        # §11.91 — alive dashboard page 가 menu (sidebar / bottom-nav) entry
        # 가지고 있는지 grep guard. §11.83 의 §11.55 dead-end 패턴 9번째
        # 회귀 (alive surface 인데 진입점 부재) 자동 catch.
        # advisory mode 시작 — Track B operator-driven cleanup 또는 명시적
        # EXEMPT_URLS 등록으로 violations 줄어든 후
        # LABAXIS_PAGE_ENTRY_COVERAGE_BLOCK=1 전환.
        run: |
          chmod +x scripts/check-frontend-page-entry-coverage.sh
          scripts/check-frontend-page-entry-coverage.sh
