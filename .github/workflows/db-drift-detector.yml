# .github/workflows/db-drift-detector.yml
#
# Read-only schema drift detector. Runs `prisma migrate status` to
# verify the production DB migration history matches the migrations
# committed in this branch.
#
# This workflow runs `prisma migrate status` ONLY. It NEVER runs
# `migrate deploy`. Production schema changes remain
# operator-shell-only per ADR-002 §11.13.
#
# Required GitHub repository secret
# ---------------------------------
# MIGRATE_STATUS_DATABASE_URL
#   Production DATABASE_URL. Transaction pooler (:6543) is fine.
#   Read-only credentials acceptable.
#
# History of failed runs (for the next person editing this)
# ---------------------------------------------------------
# Run #1 (commit 0b4130e, npx prisma generate from apps/web):
#   `npx prisma` fetched the global latest (prisma@7.8.0), which
#   removed `datasource.url` → P1012 schema validation error.
#
# Run #2 (commit 48703b0, pnpm exec prisma generate from apps/web):
#   `pnpm exec` couldn't resolve prisma — the repo is npm-managed
#   (no pnpm-workspace.yaml; package.json uses npm `workspaces`),
#   so pnpm's filter machinery saw an empty workspace set.
#
# Run #3 (commit af0317e, pnpm --filter web exec):
#   Same root cause as #2 with the explicit error
#   "WARN The 'workspaces' field in package.json is not supported
#    by pnpm. Create a 'pnpm-workspace.yaml' file instead."
#   Confirmed the repo is npm-managed and this workflow must follow.
#
# Current shape (run #4+): npm ci with postinstall, then
# `npx --no-install` so the binary stays project-pinned.

name: DB drift detector (read-only, no migrate deploy)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "apps/web/prisma/**"
      - ".github/workflows/db-drift-detector.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/prisma/**"
      - ".github/workflows/db-drift-detector.yml"

permissions:
  contents: read

jobs:
  drift-check:
    name: Read-only prisma migrate status
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (npm ci; postinstall runs prisma generate)
        # Repo is npm-managed. apps/web/package.json's postinstall
        # is `node scripts/dedupe-react.js && prisma generate`, with
        # `enable-pre-post-scripts=true` set in .npmrc — so a single
        # `npm ci` populates node_modules AND generates the prisma
        # client. No separate generate step needed.
        run: npm ci

      - name: Read-only schema drift check (no migrate deploy)
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ secrets.MIGRATE_STATUS_DATABASE_URL }}
        run: |
          # IMPORTANT: this step runs `prisma migrate status` ONLY.
          # `migrate status` is a read-only metadata query that
          # compares the `_prisma_migrations` table on the live DB
          # against the migrations on disk. It does NOT apply DDL.
          #
          # Production schema changes remain operator-shell-only
          # per ADR-002 §11.13 — never call `migrate deploy` here.
          #
          # `npx --no-install` REFUSES to fetch a fresh prisma
          # binary — it only invokes the one already linked under
          # node_modules/.bin/. Run #1 caught a fetch-the-latest
          # disaster (prisma@7.8.0 vs our 5.22.0 schema), so the
          # explicit no-install flag is load-bearing here.
          echo "::notice::Read-only check. This workflow never runs migrate deploy."
          npx --no-install prisma migrate status
